<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Monteur Vidéo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Outfit:wght@200;300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #fafaf8;
      --ink:   #111110;
      --muted: #999990;
      --accent:#c8b89a;
      --line:  #ddddd5;
      --bar-h: 120px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--white);
      font-family: 'DM Mono', monospace;
      color: var(--ink);
      cursor: none;
    }

    /* ── Cursor ── */
    #cursor {
  position: fixed;
  z-index: 9999;
  width: 40px;
  height: 40px;
  pointer-events: none;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
}

    #cursor::before,
#cursor::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.8);
  transform-origin: center;
}

    #cursor::before {
  transform: translate(-50%, -50%) rotate(45deg);
}

#cursor::after {
  transform: translate(-50%, -50%) rotate(-45deg);
}

    
    /* ── Layout shell ── */
    #shell {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    #hdr {
      height: var(--bar-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      border-bottom: 1px solid var(--line);
      animation: fadeDown .7s cubic-bezier(.23,1,.32,1) both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    /* 4. Nouvelle police pour le nom — Outfit, légère, sans italique */
    .hdr-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 200;
      font-size: 1.3rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      line-height: 1.15;
    }
    .hdr-name small {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: .58rem; font-weight: 300;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); margin-top: 6px;
    }
    .hdr-contact {
      font-size: .7rem; color: var(--muted);
      letter-spacing: .05em; line-height: 2;
      text-align: right;
    }
    .hdr-contact a { color: inherit; text-decoration: none; transition: color .2s; }
    .hdr-contact a:hover { color: var(--ink); }

    /* ── Accordion zone ── */
    #acc-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── Panels container ── */
    #acc {
      position: absolute; inset: 0;
      display: flex; flex-direction: row;
    }

    /* ── Individual panel ── */
    .panel {
      position: relative;
      height: 100%;
      overflow: hidden;
      flex-shrink: 0;
      transition: width .55s cubic-bezier(.23,1,.32,1);
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    .panel:last-child { border-right: none; }

    /* 2. Bloc couleur dégradé (remplace la miniature) */
    .panel-color {
      position: absolute; inset: 0; z-index: 2;
      transition: opacity .45s ease;
    }
    .panel.active .panel-color { opacity: 0; pointer-events: none; }

    /* iframe */
    .panel-iframe { position: absolute; inset: 0; z-index: 1; }
    .panel-iframe iframe {
      width: 100%; height: 100%;
      border: none; display: block;
      pointer-events: none;
    }
    .panel.active .panel-iframe iframe { pointer-events: auto; }

    /* 3. Titre vertical — blanc avec contour noir */
    .panel-vlabel {
      position: absolute;
      bottom: 36px; left: 50%;
      transform: translateX(-50%) rotate(180deg);
      writing-mode: vertical-rl;
      font-size: .90rem; letter-spacing: .13em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
         1px  1px 0 rgba(0,0,0,0.9),
        -1px  0   0 rgba(0,0,0,0.9),
         1px  0   0 rgba(0,0,0,0.9),
         0   -1px 0 rgba(0,0,0,0.9),
         0    1px 0 rgba(0,0,0,0.9);
      white-space: nowrap; z-index: 6;
      transition: opacity .3s ease;
      pointer-events: none;
      max-height: 55%;
      overflow: hidden;
    }
    .panel.active .panel-vlabel { opacity: 0; }

    /* Accent line */
    .panel::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--accent);
      transform: scaleX(0); transform-origin: left;
      transition: transform .5s cubic-bezier(.23,1,.32,1);
      z-index: 10;
    }
    .panel.active::after { transform: scaleX(1); }

    /* ── Info bar ── */
    #info {
      height: var(--bar-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      border-top: 1px solid var(--line);
      pointer-events: none;
    }
    #info-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-style: italic;
      font-size: clamp(1.3rem, 2.2vw, 2rem);
      letter-spacing: -.01em;
      opacity: 0; transform: translateY(6px);
      transition: opacity .35s ease, transform .35s ease;
      flex: 1;
    }
    #info-title.on { opacity: 1; transform: translateY(0); }

    /* 1. Zone artiste — centre */
    #info-artist {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: .70rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      flex: 1;
      opacity: 0; transform: translateY(6px);
      transition: opacity .35s ease .08s, transform .35s ease .08s;
    }
    #info-artist.on { opacity: 1; transform: translateY(0); }

    #info-meta {
      font-size: .68rem; color: var(--muted);
      letter-spacing: .09em; text-transform: uppercase;
      text-align: right; line-height: 2;
      flex: 1;
      opacity: 0; transform: translateY(6px);
      transition: opacity .35s ease .05s, transform .35s ease .05s;
    }
    #info-meta.on { opacity: 1; transform: translateY(0); }

    /* Load animation */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .panel { animation: fadeUp .65s cubic-bezier(.23,1,.32,1) both; }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="shell">

  <!-- Header -->
  <header id="hdr">
    <div class="hdr-name">
      Mahé RICHARD-SCHMIDT
      <small>Monteur vidéo</small>
    </div>
    <div class="hdr-contact">
      <a href="mailto:maherichardschmidt@gmail.com">maherichardschmidt@gmail.com</a><br>
      <a href="tel:+33671451971">+33 6 71 45 19 71</a>
    </div>
  </header>

  <!-- Accordion -->
  <div id="acc-wrap">
    <div id="acc"></div>
  </div>

  <!-- Info bar -->
  <div id="info">
    <div id="info-title"></div>
    <div id="info-artist"></div>
    <div id="info-meta"></div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────
// ↓↓↓  TES VIDÉOS  ↓↓↓
const videos = [
  { id: "XYP9Ufletss", title: "POUF", real: "Mahé RICHARD-SCHMIDT", year: "2025" },
  { id: "I80fSVbp-eE", title: "Neoma", real: "Nicolas ROMIEU", year: "2023" },  
  { id: "muCyrhqdBwA", title: "Garage LMR", real: "Nicolas ROMIEU", year: "2023" },  
  { id: "XqMseG4eQ9o", title: "Renée Costes", real: "Nicolas ROMIEU", year: "2023" },
  { id: "XTDjJ9pvYJI", title: "Albert Koski", real: "Nicolas ROMIEU", year: "2022" },  
  { id: "VEVohpQye-I", title: "Crash au Mali", year: "2023" },
  { id: "nUmqWk7Q4no", title: "Luke Anger - Continuum", real: "Nicolas ROMIEU", year: "2023", },
  { id: "TVLk2qBD0DM", title: "La chine et le Ping-Pong", year: "2024" },
  { id: "Nog0dxvLhQY", title: "Murphy X Frank Takuma - Centaines de roses", real: "Léo VIEIRA", year: "2024" },
];
// ─────────────────────────────────────────────────────

const N         = videos.length;
const acc       = document.getElementById('acc');
const infoTitle  = document.getElementById('info-title');
const infoArtist = document.getElementById('info-artist');
const infoMeta   = document.getElementById('info-meta');
const accWrap    = document.getElementById('acc-wrap');

// 2. Génère les couleurs de dégradé blanc → noir réparties sur N panneaux
function panelColor(i) {
  const light = Math.round(255 - (i / (N - 1)) * 255);
  return `rgb(${light},${light},${light})`;
}

// Build panels
const panels = videos.map((v, i) => {
  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.style.animationDelay = `${i * 0.045}s`;

  // Bloc couleur (remplace miniature)
  const colorBlock = document.createElement('div');
  colorBlock.className = 'panel-color';
  colorBlock.style.background = panelColor(i);

  // iframe
  const iframeWrap = document.createElement('div');
  iframeWrap.className = 'panel-iframe';
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&mute=1&loop=1&playlist=${v.id}&controls=0&modestbranding=1&rel=0&showinfo=0`;
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  iframe.title = v.title;
  iframeWrap.appendChild(iframe);

  // Vertical label
  const label = document.createElement('div');
  label.className = 'panel-vlabel';
  label.textContent = v.title;

  panel.appendChild(colorBlock);
  panel.appendChild(iframeWrap);
  panel.appendChild(label);
  acc.appendChild(panel);
  return panel;
});

// ── Width logic ──
function setWidths(activeIdx) {
  const total  = accWrap.offsetWidth;
  const ratio  = 16 / 9;
  const h      = accWrap.offsetHeight;
  const activeW = Math.min(Math.round(ratio * h), Math.round(total * 0.78));
  const restW   = Math.round((total - activeW) / (N - 1));

  panels.forEach((p, i) => {
    if (activeIdx === null) {
      p.style.width = (total / N) + 'px';
      p.classList.remove('active');
    } else if (i === activeIdx) {
      p.style.width = activeW + 'px';
      p.classList.add('active');
    } else {
      p.style.width = restW + 'px';
      p.classList.remove('active');
    }
  });
}

setWidths(null);

// Mouse events
panels.forEach((p, i) => {
  p.addEventListener('mouseenter', () => {
    setWidths(i);
    infoTitle.textContent = videos[i].title;
    infoMeta.innerHTML = videos[i].real
      ? `Réal. ${videos[i].real}<br>${videos[i].year}`
      : videos[i].year;
    infoTitle.classList.add('on');
    infoMeta.classList.add('on');
    // 1. Artiste
    if (videos[i].artist) {
      infoArtist.textContent = videos[i].artist;
      infoArtist.classList.add('on');
    } else {
      infoArtist.textContent = '';
      infoArtist.classList.remove('on');
    }
  });
});

accWrap.addEventListener('mouseleave', () => {
  setWidths(null);
  infoTitle.classList.remove('on');
  infoMeta.classList.remove('on');
  infoArtist.classList.remove('on');
});

window.addEventListener('resize', () => setWidths(null));

// ── Cursor ──
const cursor = document.getElementById('cursor');

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});


</script>
</body>
</html>
